{% load static %}
<nav class="main-header navbar navbar-expand navbar-dark bg-gray-dark">
  <!-- Left navbar links -->
  <ul class="navbar-nav">
    <li class="nav-item">
      <a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fa fa-bars"></i></a>
    </li>
    <li class="nav-item d-none d-sm-inline-block">
      <a href="#" class="nav-link">Home</a>
    </li>
    <li class="nav-item d-none d-sm-inline-block">
      <a href="#" class="nav-link">Contact</a>
    </li>
  </ul>

  <!-- Right navbar links -->
  <ul class="navbar-nav ml-auto">
    <!-- Navbar Search -->
    <li class="nav-item">
      <a class="nav-link" data-widget="navbar-search" href="#" role="button">
        <i class="fas fa-search"></i>
      </a>
      <div class="navbar-search-block">
        <form class="form-inline">
          <div class="input-group input-group-sm">
            <input class="form-control form-control-navbar" type="search" placeholder="Search" aria-label="Search">
            <div class="input-group-append">
              <button class="btn btn-navbar" type="submit">
                <i class="fas fa-search"></i>
              </button>
              <button class="btn btn-navbar" type="button" data-widget="navbar-search">
                <i class="fas fa-times"></i>
              </button>
            </div>
          </div>
        </form>
      </div>
    </li>

    <!-- Messages Menu -->
    <li class="nav-item">
      <a class="nav-link" href="{% if request.user.role == 'doctor' %}{% url 'doctor-inbox' %}{% else %}#{% endif %}">
        <i class="far fa-comments"></i>
        <span class="badge badge-danger navbar-badge" id="header-msg-badge" style="display: none;">0</span>
      </a>
    </li>
    <!-- Notifications Dropdown Menu -->
    <li class="nav-item dropdown">
      <a class="nav-link" data-toggle="dropdown" href="#">
        <i class="far fa-bell"></i>
        <span class="badge badge-warning navbar-badge" id="header-noti-badge" style="display: none;">0</span>
      </a>
      <div class="dropdown-menu dropdown-menu-lg dropdown-menu-right">
        <span class="dropdown-item dropdown-header" id="header-noti-count">0 Thông báo</span>
        <div class="dropdown-divider"></div>
        <div id="header-noti-list" style="max-height: 300px; overflow-y: auto;">
            <a href="#" class="dropdown-item text-center text-muted" id="header-noti-empty">Chưa có thông báo nào</a>
        </div>
      </div>
    </li>

    <script>
      document.addEventListener("DOMContentLoaded", function() {
          let msgCount = 0;
          let notiCount = 0;
          const msgBadge = document.getElementById("header-msg-badge");
          const notiBadge = document.getElementById("header-noti-badge");
          const notiCountHeader = document.getElementById("header-noti-count");
          const notiList = document.getElementById("header-noti-list");
          const notiEmpty = document.getElementById("header-noti-empty");

          document.addEventListener('medic:realtime-notification', function(e) {
              const data = e.detail;
              
              if (data.category === 'chat') {
                  msgCount++;
                  msgBadge.innerText = msgCount;
                  msgBadge.style.display = 'inline-block';
              } else {
                  notiCount++;
                  notiBadge.innerText = notiCount;
                  notiBadge.style.display = 'inline-block';
                  notiCountHeader.innerText = notiCount + " Thông báo";
                  
                  if (notiEmpty) {
                      notiEmpty.style.display = 'none';
                  }

                  // Build dropdown item
                  const item = document.createElement('a');
                  item.href = data.link || '#';
                  item.className = 'dropdown-item';
                  item.innerHTML = `
                    <div class="d-flex w-100 justify-content-between">
                        <small class="text-muted"><i class="fas fa-bell text-warning mr-1"></i> ${data.created_at || 'Vừa xong'}</small>
                    </div>
                    <div class="text-truncate" style="font-weight: bold; font-size: 0.9rem;">${data.title}</div>
                    <small class="text-muted text-truncate d-block">${data.message}</small>
                  `;
                  
                  // Prepend to list
                  notiList.insertBefore(item, notiList.firstChild);
                  
                  // Add divider
                  const divider = document.createElement('div');
                  divider.className = 'dropdown-divider';
                  notiList.insertBefore(divider, item.nextSibling);
              }
          });
      });
    </script>
    <li class="nav-item">
      <a class="nav-link" data-widget="fullscreen" href="#" role="button">
        <i class="fas fa-expand-arrows-alt"></i>
      </a>
    </li>
    <li class="nav-item dropdown">
      <a class="nav-link" href="#" role="button" data-toggle="dropdown">
          <i class="fas fa-sign-out-alt"></i>
      </a>
      <div class="dropdown-menu dropdown-menu-right">
          <a class="dropdown-item" href="{% url 'logout' %}">Đăng xuất</a>
      </div>
  </li>
  </ul>
</nav>
