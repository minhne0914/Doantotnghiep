version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: mlhospital_mysql
    restart: always
    environment:
      MYSQL_DATABASE: db_healthcare
      MYSQL_ROOT_PASSWORD: 123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysql_data:
