{%extends 'app.html'%} {%block content%}

<div class="content-wrapper" style="min-height: 1113.69px;">
    <!-- Content Header (Page header) -->
    <section class="content-header">
      <div class="container-fluid">
        <div class="row mb-2">
          <div class="col-sm-6">
            <!-- <h1>Simple Tables</h1> -->
          </div>
          <div class="col-sm-6">
            <ol class="breadcrumb float-sm-right">
              <li class="breadcrumb-item"><a href="">Home</a></li>
              <li class="breadcrumb-item active"><a href="">Sinh Viên</a></li>
            </ol>
          </div>
        </div>
      </div><!-- /.container-fluid -->
    </section>
  
    <!-- Main content -->
    <section class="content">
      <div class="container-fluid">
  
        <!-- /.row -->
        <div class="row">
          <div class="col-12">
            <div class="card">
              <div class="card-header">
                <h3 class="card-title"><a href="">Sinh Viên</a></h3>
                <i class="fas fa-solid fa-rotate-right"></i>
                <div class="card-tools">
                  <div class="input-group input-group-sm">
                    <form method="GET" action="" class="input-group">
                      <input type="text" name="search" class="form-control" id="searchInput" placeholder="Search" value="">
                      <div class="input-group-append">
                        <button type="submit" class="btn btn-default">
                          <i class="fas fa-search"></i>
                        </button>
                        <a class="btn btn-default" href="">
                          <i class="fas fa-solid fa-user-plus"></i>
                        </a>
                      </div>
                    </form>
                  </div>
  
                </div>
              </div>
              <!-- /.card-header -->
              <div class="card-body table-responsive p-0">
                <table class="table table-hover text-nowrap">
                  <thead>
                    <tr>
                      <th>ID</th>
                      <th>Name</th>
                      <th>Date</th>
                      <th>Phone</th>
                      <th>Email</th>
                      <th>Khoa</th>
                      <th>Lop</th>
                      <th>Chức Năng</th>
                    </tr>
                  </thead>
                  <tbody>
                    {% for patient in patients %}
                    <tr>

                        <td>{{ patient.full_name }}</td>
                        <td> {{ patient.phone_number }}</td>
                        <td> {{ patient.message }}</td>
                        <td> {{ patient.date }}</td>
                        <td>

                            <a href="">
                                <span class="">Delete</span>
                            </a>
                        </td>
                    </tr>
                {% endfor %}
                  </tbody>
                </table>
              </div>
              <!-- /.card-body -->
            </div>
            <!-- /.card -->
          </div>
        </div>
      </div>
    </section>
    <!-- /.content -->
  </div>

{%endblock%}
