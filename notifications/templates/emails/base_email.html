<!doctype html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="utf-8">
</head>
<body style="margin:0;background:#f4f7fb;font-family:Arial,sans-serif;color:#0f172a;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f7fb;padding:24px 0;">
        <tr>
            <td align="center">
                <table width="640" cellpadding="0" cellspacing="0" style="max-width:640px;width:100%;background:#ffffff;border-radius:18px;overflow:hidden;">
                    <tr>
                        <td style="background:linear-gradient(135deg,#0f766e,#0891b2);padding:24px;color:#fff;">
                            <h2 style="margin:0;">Medic</h2>
                            <p style="margin:8px 0 0;opacity:.9;">Thông báo lịch hẹn tự động</p>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:24px;">
                            {% block content %}{% endblock %}
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:18px 24px;background:#f8fafc;font-size:12px;color:#64748b;">
                            Email này được gửi tự động từ hệ thống Medic. Vui lòng không trả lời trực tiếp email này.
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
